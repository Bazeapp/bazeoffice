name: CI

on:
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test · Typecheck · Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # !cancelled() keeps the remaining checks running even if Lint failed,
      # so one CI run reports all three results instead of one at a time.
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: npm run typecheck

      - name: Test
        if: ${{ !cancelled() }}
        run: npm test
