name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase Env
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_PROJECT_REF" || (echo "Missing SUPABASE_PROJECT_REF" && exit 1)

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy table-query --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy lookup-values --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy update-record --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy update-process-stato-sales --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy create-record --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy delete-record --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy run-automation-webhook --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy create-stripe-connect-account --project-ref "$SUPABASE_PROJECT_REF"
